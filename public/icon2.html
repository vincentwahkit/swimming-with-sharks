<!DOCTYPE html>
<html>
<body style="margin:0;background:#0a1a0a">
<canvas id="c" width="192" height="192"></canvas>
<script>
const c = document.getElementById('c').getContext('2d');
c.fillStyle = '#0a1a0a';
c.fillRect(0,0,192,192);
c.font = 'bold 120px Arial';
c.fillStyle = '#4ade80';
c.textAlign = 'center';
c.textBaseline = 'middle';
c.fillText('🦈', 96, 96);
const a = document.createElement('a');
a.download = 'icon-192.png';
a.href = document.getElementById('c').toDataURL();
a.click();
</script>
</body>
</html>
